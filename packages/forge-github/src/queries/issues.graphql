query Issues($owner: String!, $repo: String!, $cursor: String) {
  repository(owner: $owner, name: $repo) {
    issues(first: 50, after: $cursor, orderBy: { field: UPDATED_AT, direction: DESC }) {
      pageInfo {
        hasNextPage
        endCursor
      }
      nodes {
        id
        number
        title
        url
        state
        createdAt
        updatedAt
        closedAt
        author {
          login
          ... on Node {
            id
          }
        }
        labels(first: 20) {
          nodes {
            name
          }
        }
      }
    }
  }
}
