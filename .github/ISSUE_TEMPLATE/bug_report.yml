name: Bug report
description: Report a defect with reproduction steps
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        With clear repro steps, expected/actual behaviour, and environment, this issue can be handed straight to an agent to investigate.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands, numbered
      placeholder: |
        1. pnpm ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour (logs / errors)
      render: shell
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Affected package / files
      placeholder: "packages/search/src/..."
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Node 24.x / pnpm 11 / macOS 15"
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low
        - medium
        - high
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues
        - label: It reproduces on the latest main
