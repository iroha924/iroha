# WP-00 CI matrix skeleton.
# Tier 1 mapping (docs/product/implementation/compatibility.md §6), verified against
# https://github.com/actions/runner-images (2026-07-18):
#   macos-14        -> macOS 14 arm64 (GitHub flags this image "Deprecated"; still GA today.
#                       Re-check runner-images before it is removed.)
#   ubuntu-22.04    -> Ubuntu 22.04 x64
#   ubuntu-22.04-arm -> Ubuntu 22.04 arm64
#   WSL2 is not representable on hosted runners; covered by later dedicated jobs/fixtures.
#
#   macOS x64 ("-large" runners, the only hosted x64 macOS option left) is
#   intentionally NOT covered here: it requires a paid spending limit on
#   this GitHub account (confirmed by an actual failed run: "recent account
#   payments have failed or your spending limit needs to be increased").
#   See implementation/decision-log.md ID-021.
#
#   windows-2025 was removed from this matrix and Windows moved from Tier 1
#   to Tier 2 in compatibility.md §6: a native libSQL WAL-mode file lock can
#   outlive db.close() on Windows for an unbounded time (confirmed both by
#   this repo's own CI reproduction and by matching reports against other
#   Node SQLite bindings), so single-invocation retry budgets cannot make
#   Windows CI reliably green. See implementation/decision-log.md ID-026(14).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - ubuntu-22.04
          - ubuntu-22.04-arm
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  # Uses the gitleaks CLI directly (not gitleaks-action, which requires a
  # paid GITLEAKS_LICENSE for organization-owned repositories). The core CLI
  # is MIT-licensed and free; verified by running it locally against this
  # repo's history before adding this job.
  secrets-scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git /repo --no-banner --redact -v

  # iroha924/iroha is public, so Code Scanning (SARIF upload) is free and
  # enabled. The reusable workflow's own job declares these three
  # permissions unconditionally, so the caller must grant them even with
  # upload-sarif: false — verified by an actual failed run (startup_failure:
  # "requesting 'actions: read, security-events: write', but is only
  # allowed 'actions: none, security-events: none'") before this fix.
  dependency-scan:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      upload-sarif: true
