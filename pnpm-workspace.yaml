packages:
  - apps/*
  - packages/*

catalogMode: strict
sharedWorkspaceLockfile: true
disallowWorkspaceCycles: true
saveWorkspaceProtocol: rolling

catalog:
  ajv: 8.20.0
  ajv-formats: 3.0.1
  "@biomejs/biome": 2.5.4
  "@changesets/cli": 2.31.1
  "@commitlint/cli": 21.2.1
  "@commitlint/config-conventional": 21.2.0
  # @iroha/forge-github (WP-12): octokit GraphQL stack + typed codegen
  "@graphql-codegen/cli": 7.2.0
  "@graphql-codegen/typed-document-node": 7.1.0
  "@graphql-codegen/typescript": 6.1.0
  "@graphql-codegen/typescript-operations": 6.1.1
  "@graphql-typed-document-node/core": 3.2.0
  "@octokit/core": 7.0.6
  "@octokit/graphql-schema": 15.26.1
  "@octokit/plugin-paginate-graphql": 6.0.0
  "@octokit/plugin-retry": 8.1.0
  "@octokit/plugin-throttling": 11.0.3
  # Also pinned in `overrides` below (a pnpm override wins unconditionally, so a
  # bump here alone is silently ignored) — keep the two in sync.
  "@hono/node-server": 2.0.10
  "@libsql/client": 0.17.4
  "@modelcontextprotocol/sdk": 1.29.0
  "@playwright/test": 1.61.1
  "@secretlint/node": 13.0.2
  "@secretlint/secretlint-rule-pattern": 13.0.2
  "@secretlint/secretlint-rule-preset-recommend": 13.0.2
  "@tailwindcss/vite": 4.3.3
  "@tanstack/react-query": 5.101.3
  "@testing-library/jest-dom": 6.9.1
  "@testing-library/react": 16.3.2
  "@testing-library/user-event": 14.6.1
  "@types/node": 24.13.3
  "@types/picomatch": 4.0.3
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@vitejs/plugin-react": 6.0.3
  "@xyflow/react": 12.11.2
  graphql: 16.14.2
  gunshi: 0.37.1
  hono: 4.12.30
  jsdom: 29.1.1
  lefthook: 2.1.10
  mdast-util-from-markdown: 2.0.3
  mdast-util-to-string: 4.0.0
  picomatch: 4.0.5
  react: 19.2.7
  react-dom: 19.2.7
  react-router-dom: 7.18.1
  secretlint: 13.0.2
  tailwindcss: 4.3.3
  tsdown: 0.22.9
  typescript: 7.0.2
  unist-util-visit: 5.1.0
  vite: 8.1.5
  vitest: 4.1.10
  yaml: 2.9.0
  zod: 4.4.3
  # apps/dashboard shadcn/ui: Base UI primitives + cva/clsx/tailwind-merge, Lucide icons,
  # the shadcn CLI (dev-only), tw-animate-css keyframes, the Calendar/Chart deps
  # (react-day-picker + date-fns, recharts), the Command palette (cmdk) and toasts (sonner).
  "@base-ui/react": 1.6.0
  class-variance-authority: 0.7.1
  clsx: 2.1.1
  cmdk: 1.1.1
  date-fns: 4.4.0
  lucide-react: 1.25.0
  react-day-picker: 10.0.1
  recharts: 3.8.0
  shadcn: 4.13.1
  sonner: 2.0.7
  tailwind-merge: 3.6.0
  tw-animate-css: 1.4.0

allowBuilds:
  # lefthook's postinstall only runs `lefthook install -f`, using the
  # prebuilt binary resolved from a normal, checksum-verified
  # optionalDependency (lefthook-<os>-<arch>) — no network fetch at
  # install time. Same trust model as @biomejs/cli-* / esbuild binaries.
  lefthook: true

minimumReleaseAgeExclude:
  - gunshi@0.37.1
  - '@tanstack/query-core@5.101.3'
  - '@tanstack/react-query@5.101.3'

# Security overrides for transitive dependencies with no in-range upstream fix
# (osv-scanner runs fail-on-vuln). Both are forced to a patched version:
#   - fast-uri 3.1.3 (GHSA-v2hh-gcrm-f6hx) is pulled transitively via ajv; 3.1.4
#     is a semver-compatible patch.
#   - @hono/node-server 1.19.14 (GHSA-frvp-7c67-39w9) is pulled only by
#     @modelcontextprotocol/sdk (^1.19.9), whose latest (1.29.0) still pins 1.x
#     and ships no patched 1.x. iroha's MCP server uses StdioServerTransport, so
#     the SDK's Streamable HTTP transport (the sole @hono/node-server consumer)
#     is never on iroha's runtime path; forcing 2.0.10 dedupes it onto the
#     version the direct deps (@iroha/api, @iroha/plugin) already resolve to.
overrides:
  fast-uri: 3.1.4
  "@hono/node-server": 2.0.10
